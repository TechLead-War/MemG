<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MemG Benchmark Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #7d8590;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }
a { color: var(--accent); }

/* Layout */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
.header .spacer { flex: 1; }
.header button { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
.header button:hover { color: var(--text); border-color: var(--text-dim); }

.main { display: grid; grid-template-columns: 340px 1fr; gap: 0; min-height: calc(100vh - 49px); }

/* Left panel — scenarios */
.panel-left { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.group-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin: 20px 0 8px; }
.group-title:first-child { margin-top: 0; }

.scenario-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.scenario-card .info { flex: 1; min-width: 0; }
.scenario-card .info .name { font-weight: 500; font-size: 13px; }
.scenario-card .info .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.run-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; }
.run-btn:hover { background: var(--accent-hover); }
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Settings panel */
.settings { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: none; }
.settings.open { display: block; }
.settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.settings-grid label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.settings-grid input, .settings-grid select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: var(--radius); font-size: 13px; }
.settings-grid input:focus, .settings-grid select:focus { outline: none; border-color: var(--accent); }

/* Right panel — runs */
.panel-right { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

.run-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.run-card-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.run-card-header .run-name { font-weight: 500; font-size: 13px; }
.run-card-header .run-id { font-size: 11px; color: var(--text-dim); }
.run-card-header .spacer { flex: 1; }
.status-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
.status-badge.running { background: rgba(88,166,255,0.15); color: var(--blue); }
.status-badge.done { background: rgba(63,185,80,0.15); color: var(--green); }
.status-badge.failed { background: rgba(248,81,73,0.15); color: var(--red); }
.stop-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 3px 10px; border-radius: var(--radius); cursor: pointer; font-size: 11px; }
.stop-btn:hover { background: rgba(248,81,73,0.1); }

.run-output { background: #010409; padding: 10px 14px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; line-height: 1.5; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #c9d1d9; }

.run-result { padding: 12px 14px; }
.run-result table { width: 100%; border-collapse: collapse; font-size: 12px; }
.run-result th, .run-result td { padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.run-result th { color: var(--text-dim); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
.run-result .score { font-weight: 600; font-variant-numeric: tabular-nums; }
.score-good { color: var(--green); }
.score-mid { color: var(--yellow); }
.score-low { color: var(--red); }

/* Comparison table */
.comparison { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.comparison-header { padding: 10px 14px; font-weight: 500; font-size: 13px; border-bottom: 1px solid var(--border); }
.comparison table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comparison th, .comparison td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.comparison th { color: var(--text-dim); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; background: var(--surface2); position: sticky; top: 0; }
.comparison td { font-variant-numeric: tabular-nums; }
.comparison tr:last-child td { border-bottom: none; }

.empty-state { text-align: center; color: var(--text-dim); padding: 60px 20px; }
.empty-state p { margin-top: 8px; font-size: 13px; }

/* Custom run */
.custom-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.custom-section textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: var(--radius); font-family: 'SF Mono', monospace; font-size: 12px; resize: vertical; min-height: 36px; }
.custom-section textarea:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>MemG Benchmark Dashboard</h1>
  <span class="spacer"></span>
  <button onclick="toggleSettings()">Settings</button>
  <button onclick="refreshRuns()">Refresh</button>
</div>

<div class="settings" id="settings">
  <div class="settings-grid">
    <div>
      <label>LLM Provider</label>
      <select id="s-provider">
        <option value="openai" selected>openai</option>
        <option value="anthropic">anthropic</option>
        <option value="gemini">gemini</option>
        <option value="ollama">ollama</option>
        <option value="groq">groq</option>
        <option value="deepseek">deepseek</option>
        <option value="xai">xai</option>
        <option value="togetherai">togetherai</option>
        <option value="azureopenai">azureopenai</option>
        <option value="bedrock">bedrock</option>
      </select>
    </div>
    <div>
      <label>LLM Model</label>
      <input id="s-model" value="gpt-4o-mini" placeholder="gpt-4o-mini">
    </div>
    <div>
      <label>LLM API Key</label>
      <input id="s-apikey" type="password" placeholder="from environment">
    </div>
    <div>
      <label>Embed Provider</label>
      <select id="s-embed-provider">
        <option value="openai" selected>openai</option>
        <option value="ollama">ollama</option>
        <option value="gemini">gemini</option>
        <option value="cohere">cohere</option>
        <option value="voyageai">voyageai</option>
        <option value="huggingface">huggingface</option>
        <option value="togetherai">togetherai</option>
        <option value="azureopenai">azureopenai</option>
        <option value="bedrock">bedrock</option>
        <option value="openaicompat">openaicompat</option>
      </select>
    </div>
    <div>
      <label>Embed Model</label>
      <input id="s-embed-model" placeholder="provider default">
    </div>
    <div>
      <label>Embed API Key</label>
      <input id="s-embed-apikey" type="password" placeholder="same as LLM">
    </div>
    <div>
      <label>Data Path</label>
      <input id="s-datapath" placeholder="bench/testdata/locomo10.json">
    </div>
    <div>
      <label>Debug Output</label>
      <select id="s-debug">
        <option value="">Off</option>
        <option value="1">On</option>
      </select>
    </div>
  </div>
</div>

<div class="main">
  <div class="panel-left" id="scenarios"></div>
  <div class="panel-right" id="runs">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <p>Select a scenario and click Run to start a benchmark</p>
    </div>
  </div>
</div>

<script>
let scenarios = [];
let activeRuns = {};  // id -> { es: EventSource, outputEl, cardEl }
let completedRuns = []; // [{id, scenario, result, duration, args}]

async function init() {
  const resp = await fetch('/api/scenarios');
  scenarios = await resp.json();
  renderScenarios();
  await refreshRuns();
}

function renderScenarios() {
  const el = document.getElementById('scenarios');
  const groups = {};
  scenarios.forEach(s => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    html += '<div class="group-title">' + esc(group) + '</div>';
    items.forEach(s => {
      html += '<div class="scenario-card">' +
        '<div class="info"><div class="name">' + esc(s.name) + '</div>' +
        '<div class="desc" title="' + esc(s.description) + '">' + esc(s.description) + '</div></div>' +
        '<button class="run-btn" onclick="startRun(\'' + s.id + '\')">Run</button>' +
        '</div>';
    });
  }

  // Custom run section
  html += '<div class="custom-section">' +
    '<div class="group-title">Custom Run</div>' +
    '<textarea id="custom-args" placeholder="Extra flags, e.g.: -conversations conv-42 -categories 1,2" rows="2"></textarea>' +
    '<button class="run-btn" style="margin-top:8px;width:100%" onclick="startCustom()">Run Custom</button>' +
    '</div>';

  el.innerHTML = html;
}

function getSettings() {
  return {
    provider: document.getElementById('s-provider').value,
    model: document.getElementById('s-model').value,
    api_key: document.getElementById('s-apikey').value,
    embed_provider: document.getElementById('s-embed-provider').value,
    embed_model: document.getElementById('s-embed-model').value,
    embed_api_key: document.getElementById('s-embed-apikey').value,
    data_path: document.getElementById('s-datapath').value,
    debug: document.getElementById('s-debug').value === '1',
  };
}

async function startRun(scenarioId) {
  const settings = getSettings();
  const body = Object.assign({ scenario_id: scenarioId, extra_args: '' }, settings);
  const resp = await fetch('/api/run/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  addRunPanel(data.id, data.scenario);
  connectStream(data.id);
}

async function startCustom() {
  const extra = document.getElementById('custom-args').value.trim();
  const settings = getSettings();
  const body = Object.assign({ scenario_id: 'custom', extra_args: extra }, settings);
  const resp = await fetch('/api/run/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  addRunPanel(data.id, 'Custom');
  connectStream(data.id);
}

function addRunPanel(id, scenario) {
  document.getElementById('empty-state').style.display = 'none';
  const container = document.getElementById('runs');

  const card = document.createElement('div');
  card.className = 'run-card';
  card.id = 'card-' + id;
  card.innerHTML =
    '<div class="run-card-header">' +
      '<span class="run-name">' + esc(scenario) + '</span>' +
      '<span class="run-id">' + esc(id) + '</span>' +
      '<span class="spacer"></span>' +
      '<span class="status-badge running" id="status-' + id + '">running</span>' +
      '<button class="stop-btn" id="stop-' + id + '" onclick="stopRun(\'' + id + '\')">Stop</button>' +
    '</div>' +
    '<div class="run-output" id="output-' + id + '"></div>' +
    '<div class="run-result" id="result-' + id + '" style="display:none"></div>';

  // Insert before comparison table if it exists, otherwise append.
  const comp = document.getElementById('comparison');
  if (comp) {
    container.insertBefore(card, comp);
  } else {
    container.appendChild(card);
  }

  activeRuns[id] = {
    cardEl: card,
    outputEl: card.querySelector('.run-output'),
  };
}

function connectStream(id) {
  const es = new EventSource('/api/stream/' + id);
  activeRuns[id].es = es;
  const outputEl = activeRuns[id].outputEl;

  es.onmessage = function(e) {
    outputEl.textContent += e.data + '\n';
    outputEl.scrollTop = outputEl.scrollHeight;
  };

  es.addEventListener('done', function(e) {
    es.close();
    const statusEl = document.getElementById('status-' + id);
    const stopEl = document.getElementById('stop-' + id);
    const status = e.data;

    if (status === 'done') {
      statusEl.className = 'status-badge done';
      statusEl.textContent = 'done';
    } else {
      statusEl.className = 'status-badge failed';
      statusEl.textContent = 'failed';
    }
    if (stopEl) stopEl.style.display = 'none';

    // Fetch full run data with result.
    fetchRunResult(id);
  });

  es.onerror = function() {
    es.close();
    // Connection lost — try to fetch final state.
    setTimeout(function() { fetchRunResult(id); }, 500);
  };
}

async function fetchRunResult(id) {
  const resp = await fetch('/api/run/' + id);
  if (!resp.ok) return;
  const run = await resp.json();

  const statusEl = document.getElementById('status-' + id);
  if (statusEl) {
    statusEl.className = 'status-badge ' + run.status;
    statusEl.textContent = run.status;
  }
  const stopEl = document.getElementById('stop-' + id);
  if (stopEl && run.status !== 'running') stopEl.style.display = 'none';

  if (run.result) {
    renderRunResult(id, run);
    addToComparison(run);
  }
}

function renderRunResult(id, run) {
  const el = document.getElementById('result-' + id);
  if (!el || !run.result) return;

  const cats = run.result.Categories || [];
  const catOrder = [4, 1, 2, 3, 5];
  const catNames = { 1: 'Multi-Hop', 2: 'Temporal', 3: 'Open-Domain', 4: 'Single-Hop', 5: 'Adversarial' };

  let rows = '';
  const sorted = [];
  catOrder.forEach(cn => {
    const c = cats.find(x => x.Category === cn);
    if (c) sorted.push(c);
  });
  cats.forEach(c => { if (!sorted.find(x => x.Category === c.Category)) sorted.push(c); });

  sorted.forEach(c => {
    rows += '<tr><td>' + esc(c.Name || catNames[c.Category] || 'cat-' + c.Category) + '</td>' +
      '<td>' + c.Count + '</td>' +
      '<td class="score ' + scoreClass(c.AvgF1) + '">' + (c.AvgF1 * 100).toFixed(1) + '%</td></tr>';
  });

  el.innerHTML =
    '<table><thead><tr><th>Category</th><th>Count</th><th>Avg F1</th></tr></thead><tbody>' +
    rows +
    '<tr style="font-weight:600"><td>Overall</td><td>' + run.result.TotalQA +
    '</td><td class="score ' + scoreClass(run.result.OverallF1) + '">' +
    (run.result.OverallF1 * 100).toFixed(1) + '%</td></tr>' +
    '</tbody></table>';
  el.style.display = 'block';
}

function addToComparison(run) {
  completedRuns.push(run);
  renderComparison();
}

function renderComparison() {
  if (completedRuns.length < 1) return;
  let comp = document.getElementById('comparison');
  if (!comp) {
    comp = document.createElement('div');
    comp.className = 'comparison';
    comp.id = 'comparison';
    document.getElementById('runs').appendChild(comp);
  }

  const catNames = { 1: 'Multi-Hop', 2: 'Temporal', 3: 'Open-Domain', 4: 'Single-Hop', 5: 'Adversarial' };
  const catOrder = [4, 1, 2, 3, 5];

  // Collect all category numbers present.
  const allCats = new Set();
  completedRuns.forEach(r => {
    if (r.result && r.result.Categories) {
      r.result.Categories.forEach(c => allCats.add(c.Category));
    }
  });
  const displayCats = catOrder.filter(c => allCats.has(c));

  let header = '<th>Run</th><th>Scenario</th>';
  displayCats.forEach(cn => { header += '<th>' + esc(catNames[cn] || 'Cat ' + cn) + '</th>'; });
  header += '<th>Overall</th><th>Facts</th><th>Duration</th>';

  let rows = '';
  completedRuns.forEach(r => {
    if (!r.result) return;
    rows += '<tr>';
    rows += '<td>' + esc(r.id) + '</td>';
    rows += '<td>' + esc(r.scenario) + '</td>';

    displayCats.forEach(cn => {
      const c = r.result.Categories ? r.result.Categories.find(x => x.Category === cn) : null;
      if (c) {
        rows += '<td class="' + scoreClass(c.AvgF1) + '">' + (c.AvgF1 * 100).toFixed(1) + '%</td>';
      } else {
        rows += '<td style="color:var(--text-dim)">-</td>';
      }
    });

    rows += '<td class="' + scoreClass(r.result.OverallF1) + '" style="font-weight:600">' +
      (r.result.OverallF1 * 100).toFixed(1) + '%</td>';
    rows += '<td>' + (r.result.TotalFacts || '-') + '</td>';
    rows += '<td>' + (r.duration || formatNs(r.result.Duration)) + '</td>';
    rows += '</tr>';
  });

  comp.innerHTML =
    '<div class="comparison-header">Comparison (' + completedRuns.length + ' runs)</div>' +
    '<div style="overflow-x:auto"><table><thead><tr>' + header + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

async function stopRun(id) {
  await fetch('/api/stop/' + id, { method: 'POST' });
}

async function refreshRuns() {
  const resp = await fetch('/api/runs');
  const runs = await resp.json();
  if (!runs || runs.length === 0) return;

  runs.forEach(r => {
    if (!activeRuns[r.id]) {
      addRunPanel(r.id, r.scenario);
      if (r.status === 'running') {
        connectStream(r.id);
      } else {
        // Already finished — show output + result.
        const statusEl = document.getElementById('status-' + r.id);
        if (statusEl) {
          statusEl.className = 'status-badge ' + r.status;
          statusEl.textContent = r.status;
        }
        const stopEl = document.getElementById('stop-' + r.id);
        if (stopEl) stopEl.style.display = 'none';
        fetchRunResult(r.id);
      }
    }
  });
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function scoreClass(v) {
  if (v >= 0.6) return 'score-good';
  if (v >= 0.3) return 'score-mid';
  return 'score-low';
}

function formatNs(ns) {
  if (!ns) return '-';
  const sec = Math.round(ns / 1e9);
  if (sec < 60) return sec + 's';
  return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
