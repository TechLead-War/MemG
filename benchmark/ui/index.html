<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemG — LoCoMo Benchmark</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text2: #8888a0;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00b894;
      --red: #ff6b6b;
      --orange: #fdcb6e;
      --blue: #74b9ff;
      --radius: 8px;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent2); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.running { background: rgba(108, 92, 231, 0.2); color: var(--accent2); }
    .status-badge.completed { background: rgba(0, 184, 148, 0.2); color: var(--green); }
    .status-badge.failed { background: rgba(255, 107, 107, 0.2); color: var(--red); }
    .status-badge.idle { background: rgba(136, 136, 160, 0.15); color: var(--text2); }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.running .status-dot {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Config Panel ── */

    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input, .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }

    .field input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }

    .checkbox-field {
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    .checkbox-field label {
      text-transform: none;
      font-size: 14px;
      color: var(--text);
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #5a4bd6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-danger {
      background: rgba(255, 107, 107, 0.15);
      color: var(--red);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .btn-danger:hover { background: rgba(255, 107, 107, 0.25); }

    .btn-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* ── Progress ── */

    .progress-bar-container {
      background: var(--surface2);
      border-radius: 4px;
      height: 8px;
      margin: 12px 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text2);
      font-family: var(--mono);
    }

    /* ── Score Cards ── */

    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .score-card .label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .score-card .value {
      font-size: 32px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .score-card .sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }

    .score-good { color: var(--green); }
    .score-mid { color: var(--orange); }
    .score-low { color: var(--red); }

    /* ── Category Breakdown ── */

    .category-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .category-table th, .category-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .category-table th {
      background: var(--surface2);
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .category-table td {
      font-size: 14px;
    }

    .category-table tr:last-child td {
      border-bottom: none;
    }

    .category-table .mono {
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── Score Bar (inline) ── */

    .score-bar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    .score-bar-value {
      font-family: var(--mono);
      font-size: 13px;
      min-width: 48px;
      text-align: right;
    }

    /* ── Conversation Cards ── */

    .conv-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .conv-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
    }

    .conv-header:hover { background: var(--surface2); }

    .conv-header .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .conv-header .conv-idx {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .conv-header .speakers {
      font-weight: 500;
    }

    .conv-header .meta {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      gap: 16px;
    }

    .conv-header .scores {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .conv-header .score-pill {
      font-family: var(--mono);
      font-size: 13px;
      padding: 2px 10px;
      border-radius: 4px;
    }

    .conv-details {
      display: none;
      border-top: 1px solid var(--border);
    }

    .conv-details.open { display: block; }

    /* ── Question List ── */

    .q-list { padding: 0; }

    .q-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 40px 80px 1fr 100px 80px;
      gap: 12px;
      align-items: start;
      font-size: 13px;
    }

    .q-item:last-child { border-bottom: none; }

    .q-item .q-idx {
      font-family: var(--mono);
      color: var(--text2);
      font-size: 12px;
    }

    .q-item .q-cat {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      text-align: center;
      font-weight: 500;
    }

    .cat-1 { background: rgba(116, 185, 255, 0.15); color: var(--blue); }
    .cat-2 { background: rgba(253, 203, 110, 0.15); color: var(--orange); }
    .cat-3 { background: rgba(162, 155, 254, 0.15); color: var(--accent2); }
    .cat-4 { background: rgba(0, 184, 148, 0.15); color: var(--green); }
    .cat-5 { background: rgba(255, 107, 107, 0.15); color: var(--red); }

    .q-item .q-text { color: var(--text); }

    .q-item .q-score {
      font-family: var(--mono);
      text-align: right;
    }

    .q-item .q-judge {
      text-align: center;
    }

    .q-expandable {
      cursor: pointer;
    }

    .q-expandable:hover { background: var(--surface2); }

    .q-detail {
      display: none;
      padding: 12px 20px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .q-detail.open { display: block; }

    .q-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .q-detail-section h4 {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .q-detail-section pre {
      background: var(--bg);
      padding: 10px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
      color: var(--text);
    }

    .q-detail-section.full-width {
      grid-column: 1 / -1;
    }

    /* ── History Panel ── */

    .history-list { list-style: none; }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
    }

    .history-item:hover { background: var(--surface2); }

    .history-item .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .history-item .run-id {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent2);
    }

    .history-item .run-date {
      font-size: 13px;
      color: var(--text2);
    }

    .history-item .run-model {
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .history-item .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .history-item .score-pill {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
    }

    /* ── Empty state ── */

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    /* ── Scrollbar ── */

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Filter bar ── */

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── Responsive ── */

    @media (max-width: 768px) {
      main { padding: 16px; }
      .config-grid { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .q-item { grid-template-columns: 40px 1fr; }
      .q-item .q-cat, .q-item .q-score, .q-item .q-judge { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>MemG <span>LoCoMo Benchmark</span></h1>
  <div id="globalStatus">
    <span class="status-badge idle"><span class="status-dot"></span> Idle</span>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-tab="run">Run Benchmark</button>
    <button class="tab" data-tab="results">Results</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <!-- ── Run Tab ── -->
  <div id="tab-run" class="tab-content active">
    <div class="config-panel">
      <div class="config-grid">
        <div class="field">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="sk-... or key-...">
        </div>
        <div class="field">
          <label>LLM Provider</label>
          <select id="llmProvider">
            <option value="gemini" selected>Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
          </select>
        </div>
        <div class="field">
          <label>Extraction Model</label>
          <input type="text" id="extractionModel" value="gemini-2.0-flash">
        </div>
        <div class="field">
          <label>Answer Model</label>
          <input type="text" id="answerModel" value="gemini-2.0-flash">
        </div>
        <div class="field">
          <label>Judge Model</label>
          <input type="text" id="judgeModel" value="gemini-2.0-flash">
        </div>
        <div class="field">
          <label>Embedding Provider</label>
          <select id="embedProvider">
            <option value="gemini" selected>Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="sentence-transformers">Sentence Transformers (requires @huggingface/transformers)</option>
          </select>
        </div>
        <div class="field">
          <label>Conversations (0-9, comma-sep, empty=all)</label>
          <input type="text" id="conversations" placeholder="e.g. 0,1,2">
        </div>
        <div class="field">
          <label>Categories (1-5, comma-sep, empty=all)</label>
          <input type="text" id="categories" placeholder="e.g. 1,2,4">
        </div>
        <div class="field checkbox-field">
          <input type="checkbox" id="useLLMJudge" checked>
          <label for="useLLMJudge">Use LLM-as-Judge evaluation</label>
        </div>
        <div class="field">
          <label>Concurrency (parallel conversations)</label>
          <input type="number" id="concurrency" value="10" min="1" max="10">
        </div>
        <div class="field">
          <label>Question batch size</label>
          <input type="number" id="questionBatchSize" value="10" min="1" max="50">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnStart">Start Benchmark</button>
        <button class="btn btn-danger" id="btnCancel" style="display:none">Cancel</button>
      </div>
    </div>

    <div id="progressSection" style="display:none">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">Initializing...</div>
    </div>
  </div>

  <!-- ── Results Tab ── -->
  <div id="tab-results" class="tab-content">
    <div id="resultsEmpty" class="empty-state">
      <h3>No results yet</h3>
      <p>Run a benchmark or select one from history.</p>
    </div>

    <div id="resultsContent" style="display:none">
      <!-- Overall scores -->
      <div class="score-grid" id="scoreGrid"></div>

      <!-- Category breakdown -->
      <h3 style="margin-bottom:12px; font-size:15px; color:var(--text2)">Category Breakdown</h3>
      <table class="category-table" id="categoryTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Questions</th>
            <th>F1 Score</th>
            <th>Exact Match</th>
            <th>LLM Judge</th>
          </tr>
        </thead>
        <tbody id="categoryBody"></tbody>
      </table>

      <!-- Per-conversation breakdown -->
      <h3 style="margin-bottom:12px; font-size:15px; color:var(--text2)">Conversations</h3>
      <div id="conversationsList"></div>
    </div>
  </div>

  <!-- ── History Tab ── -->
  <div id="tab-history" class="tab-content">
    <div id="historyEmpty" class="empty-state">
      <h3>No past runs</h3>
      <p>Run a benchmark to see results here.</p>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </div>
</main>

<script>
  // ── State ──
  let currentRun = null;
  let pollTimer = null;

  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

      if (tab.dataset.tab === 'history') loadHistory();
    });
  });

  // ── Helpers ──
  function scoreColor(val) {
    if (val >= 0.6) return 'score-good';
    if (val >= 0.3) return 'score-mid';
    return 'score-low';
  }

  function pct(val) {
    return (val * 100).toFixed(1) + '%';
  }

  function fillColor(val) {
    if (val >= 0.6) return 'var(--green)';
    if (val >= 0.3) return 'var(--orange)';
    return 'var(--red)';
  }

  function scoreBar(val) {
    return `<div class="score-bar">
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:${val*100}%;background:${fillColor(val)}"></div>
      </div>
      <span class="score-bar-value ${scoreColor(val)}">${pct(val)}</span>
    </div>`;
  }

  // ── Start Benchmark ──
  document.getElementById('btnStart').addEventListener('click', async () => {
    const rawKey = document.getElementById('apiKey').value.trim();
    // Allow empty or '(server)' — server will use env key.
    const apiKey = (rawKey === '(server)' || rawKey === '') ? '__USE_SERVER_KEY__' : rawKey;

    const convs = document.getElementById('conversations').value.trim();
    const cats = document.getElementById('categories').value.trim();

    const config = {
      apiKey,
      llmProvider: document.getElementById('llmProvider').value,
      extractionModel: document.getElementById('extractionModel').value,
      answerModel: document.getElementById('answerModel').value,
      judgeModel: document.getElementById('judgeModel').value,
      embedProvider: document.getElementById('embedProvider').value,
      conversations: convs ? convs.split(',').map(Number) : [],
      categories: cats ? cats.split(',').map(Number) : [],
      useLLMJudge: document.getElementById('useLLMJudge').checked,
      concurrency: parseInt(document.getElementById('concurrency').value) || 10,
      questionBatchSize: parseInt(document.getElementById('questionBatchSize').value) || 10,
    };

    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnCancel').style.display = 'inline-block';
    document.getElementById('progressSection').style.display = 'block';
    updateStatus('running', 'Running');

    try {
      const res = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });

      const data = await res.json();
      if (!res.ok) {
        alert(data.error || 'Failed to start');
        resetRunUI();
        return;
      }

      startPolling(data.runId);
    } catch (err) {
      alert('Failed to connect: ' + err.message);
      resetRunUI();
    }
  });

  // ── Cancel ──
  document.getElementById('btnCancel').addEventListener('click', async () => {
    await fetch('/api/cancel', { method: 'POST' });
  });

  // ── Polling ──
  function startPolling(runId) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch('/api/progress');
        const data = await res.json();

        if (!data.running) {
          clearInterval(pollTimer);
          pollTimer = null;

          // Fetch final results.
          if (runId && runId !== '...') {
            const runRes = await fetch(`/api/runs/${runId}`);
            if (runRes.ok) {
              currentRun = await runRes.json();
              renderResults(currentRun);
              switchTab('results');
            }
          } else {
            // Fetch latest run.
            const runsRes = await fetch('/api/runs');
            const runs = await runsRes.json();
            if (runs.length > 0 && runs[0].id) {
              const runRes = await fetch(`/api/runs/${runs[0].id}`);
              if (runRes.ok) {
                currentRun = await runRes.json();
                renderResults(currentRun);
                switchTab('results');
              }
            }
          }

          resetRunUI();
          updateStatus(currentRun?.status ?? 'completed', currentRun?.status === 'failed' ? 'Failed' : 'Complete');
          return;
        }

        const p = data.progress;
        if (p) {
          runId = data.runId;
          if (p.currentPhase === 'ingesting') {
            const sPct = (p.totalSessions > 0) ? ((p.completedSessions ?? 0) / p.totalSessions * 100) : 0;
            document.getElementById('progressBar').style.width = sPct + '%';
            document.getElementById('progressText').textContent =
              `Ingesting session ${p.completedSessions ?? 0}/${p.totalSessions ?? 0} — 0/${p.totalQuestions} questions`;
          } else {
            const qPct = p.totalQuestions > 0 ? (p.completedQuestions / p.totalQuestions * 100) : 0;
            document.getElementById('progressBar').style.width = qPct + '%';
            document.getElementById('progressText').textContent =
              `Evaluating conversation ${(p.currentConversation ?? 0) + 1}/${p.totalConversations} — ${p.completedQuestions}/${p.totalQuestions} questions (${qPct.toFixed(0)}%)`;
          }
        }
      } catch {}
    }, 1500);
  }

  function resetRunUI() {
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnCancel').style.display = 'none';
  }

  function updateStatus(status, text) {
    document.getElementById('globalStatus').innerHTML =
      `<span class="status-badge ${status}"><span class="status-dot"></span> ${text}</span>`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => {
      c.classList.toggle('active', c.id === 'tab-' + name);
    });
  }

  // ── Render Results ──
  function renderResults(run) {
    document.getElementById('resultsEmpty').style.display = 'none';
    document.getElementById('resultsContent').style.display = 'block';

    const o = run.overall;

    // Score cards.
    let cards = `
      <div class="score-card">
        <div class="label">Overall F1</div>
        <div class="value ${scoreColor(o.f1Avg)}">${pct(o.f1Avg)}</div>
        <div class="sub">${o.totalQuestions} questions</div>
      </div>
      <div class="score-card">
        <div class="label">Exact Match</div>
        <div class="value ${scoreColor(o.exactMatchRate)}">${pct(o.exactMatchRate)}</div>
      </div>`;

    if (o.llmJudgeRate != null) {
      cards += `
      <div class="score-card">
        <div class="label">LLM Judge Accuracy</div>
        <div class="value ${scoreColor(o.llmJudgeRate)}">${pct(o.llmJudgeRate)}</div>
      </div>`;
    }

    if (o.adversarialRejectionRate != null) {
      cards += `
      <div class="score-card">
        <div class="label">Adversarial Rejection</div>
        <div class="value ${scoreColor(o.adversarialRejectionRate)}">${pct(o.adversarialRejectionRate)}</div>
      </div>`;
    }

    cards += `
      <div class="score-card">
        <div class="label">Facts Extracted</div>
        <div class="value" style="color:var(--accent2)">${o.totalFacts}</div>
      </div>`;

    document.getElementById('scoreGrid').innerHTML = cards;

    // Category table.
    let rows = '';
    for (const cs of o.categoryScores) {
      rows += `<tr>
        <td><span class="q-cat cat-${cs.category}">${cs.name}</span></td>
        <td class="mono">${cs.total}</td>
        <td>${scoreBar(cs.f1Avg)}</td>
        <td>${scoreBar(cs.exactMatchRate)}</td>
        <td>${cs.llmJudgeRate != null ? scoreBar(cs.llmJudgeRate) : '<span style="color:var(--text2)">—</span>'}</td>
      </tr>`;
    }
    document.getElementById('categoryBody').innerHTML = rows;

    // Conversations.
    let convHtml = '';
    for (const conv of run.conversations) {
      const judgeStr = conv.overallLLMJudge != null ? pct(conv.overallLLMJudge) : '—';
      convHtml += `
      <div class="conv-card" id="conv-${conv.conversationIdx}">
        <div class="conv-header" onclick="toggleConv(${conv.conversationIdx})">
          <div class="left">
            <span class="conv-idx">#${conv.conversationIdx}</span>
            <span class="speakers">${conv.speakerA} & ${conv.speakerB}</span>
            <span class="meta">
              <span>${conv.sessions} sessions</span>
              <span>${conv.turns} turns</span>
              <span>${conv.factsExtracted} facts</span>
            </span>
          </div>
          <div class="scores">
            <span class="score-pill ${scoreColor(conv.overallF1)}">F1: ${pct(conv.overallF1)}</span>
            <span class="score-pill ${scoreColor(conv.overallLLMJudge ?? 0)}">Judge: ${judgeStr}</span>
          </div>
        </div>
        <div class="conv-details" id="conv-details-${conv.conversationIdx}">
          <div class="filter-bar" style="padding:12px 20px 0">
            <button class="filter-chip active" onclick="filterQuestions(${conv.conversationIdx}, 0, this)">All</button>
            <button class="filter-chip" onclick="filterQuestions(${conv.conversationIdx}, 4, this)">Single-hop</button>
            <button class="filter-chip" onclick="filterQuestions(${conv.conversationIdx}, 1, this)">Multi-hop</button>
            <button class="filter-chip" onclick="filterQuestions(${conv.conversationIdx}, 2, this)">Temporal</button>
            <button class="filter-chip" onclick="filterQuestions(${conv.conversationIdx}, 3, this)">Open-domain</button>
            <button class="filter-chip" onclick="filterQuestions(${conv.conversationIdx}, 5, this)">Adversarial</button>
          </div>
          <div class="q-list" id="qlist-${conv.conversationIdx}">
            ${renderQuestions(conv.questions)}
          </div>
        </div>
      </div>`;
    }
    document.getElementById('conversationsList').innerHTML = convHtml;
  }

  function renderQuestions(questions) {
    let html = '';
    for (const q of questions) {
      const judgeIcon = q.llmJudge === true ? '<span style="color:var(--green)">&#10003;</span>'
        : q.llmJudge === false ? '<span style="color:var(--red)">&#10007;</span>'
        : '<span style="color:var(--text2)">—</span>';

      html += `
      <div class="q-item q-expandable" data-cat="${q.category}" onclick="toggleQuestion(this)">
        <span class="q-idx">${q.questionIdx + 1}</span>
        <span class="q-cat cat-${q.category}">${q.categoryName}</span>
        <span class="q-text">${escHtml(q.question)}</span>
        <span class="q-score ${scoreColor(q.f1)}">${pct(q.f1)}</span>
        <span class="q-judge">${judgeIcon}</span>
      </div>
      <div class="q-detail">
        <div class="q-detail-grid">
          <div class="q-detail-section">
            <h4>Ground Truth</h4>
            <pre>${escHtml(q.groundTruth)}</pre>
          </div>
          <div class="q-detail-section">
            <h4>Predicted Answer</h4>
            <pre>${escHtml(q.predicted)}</pre>
          </div>
          <div class="q-detail-section full-width">
            <h4>Memory Context</h4>
            <pre>${escHtml(q.memoryContext || '(none)')}</pre>
          </div>
        </div>
      </div>`;
    }
    return html;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Toggles ──
  function toggleConv(idx) {
    const el = document.getElementById('conv-details-' + idx);
    el.classList.toggle('open');
  }

  function toggleQuestion(el) {
    const detail = el.nextElementSibling;
    if (detail && detail.classList.contains('q-detail')) {
      detail.classList.toggle('open');
    }
  }

  function filterQuestions(convIdx, cat, chip) {
    // Update active chip.
    const parent = chip.parentElement;
    parent.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    // Filter questions.
    const list = document.getElementById('qlist-' + convIdx);
    const items = list.querySelectorAll('.q-item, .q-detail');
    items.forEach(item => {
      if (item.classList.contains('q-detail')) return;
      const qCat = parseInt(item.dataset.cat);
      const show = cat === 0 || qCat === cat;
      item.style.display = show ? '' : 'none';
      // Also hide the detail.
      const detail = item.nextElementSibling;
      if (detail && detail.classList.contains('q-detail')) {
        detail.style.display = show ? '' : 'none';
        if (!show) detail.classList.remove('open');
      }
    });
  }

  // ── History ──
  async function loadHistory() {
    try {
      const res = await fetch('/api/runs');
      const runs = await res.json();

      if (runs.length === 0) {
        document.getElementById('historyEmpty').style.display = 'block';
        document.getElementById('historyList').innerHTML = '';
        return;
      }

      document.getElementById('historyEmpty').style.display = 'none';
      let html = '';
      for (const r of runs) {
        const date = new Date(r.startedAt).toLocaleString();
        const model = r.config?.answerModel ?? '?';
        const f1 = r.overall?.f1Avg ?? 0;
        const judge = r.overall?.llmJudgeRate;

        html += `
        <li class="history-item" onclick="loadRun('${r.id}')">
          <div class="left">
            <span class="status-badge ${r.status}"><span class="status-dot"></span> ${r.status}</span>
            <span class="run-id">${r.id}</span>
            <span class="run-date">${date}</span>
            <span class="run-model">${model}</span>
          </div>
          <div class="right">
            <span class="score-pill ${scoreColor(f1)}">F1: ${pct(f1)}</span>
            ${judge != null ? `<span class="score-pill ${scoreColor(judge)}">Judge: ${pct(judge)}</span>` : ''}
          </div>
        </li>`;
      }
      document.getElementById('historyList').innerHTML = html;
    } catch {}
  }

  async function loadRun(runId) {
    try {
      const res = await fetch(`/api/runs/${runId}`);
      if (res.ok) {
        currentRun = await res.json();
        renderResults(currentRun);
        switchTab('results');
      }
    } catch {}
  }

  // ── Provider model defaults ──
  const MODEL_DEFAULTS = {
    openai: { extraction: 'gpt-4o-mini', answer: 'gpt-4o-mini', judge: 'gpt-4o-mini' },
    anthropic: { extraction: 'claude-haiku-4-5-20251001', answer: 'claude-haiku-4-5-20251001', judge: 'claude-haiku-4-5-20251001' },
    gemini: { extraction: 'gemini-2.0-flash', answer: 'gemini-2.0-flash', judge: 'gemini-2.0-flash' },
  };

  document.getElementById('llmProvider').addEventListener('change', function(e) {
    const provider = e.target.value;
    const defaults = MODEL_DEFAULTS[provider] || MODEL_DEFAULTS.openai;
    document.getElementById('extractionModel').value = defaults.extraction;
    document.getElementById('answerModel').value = defaults.answer;
    document.getElementById('judgeModel').value = defaults.judge;
    if (provider === 'openai' || provider === 'gemini') {
      document.getElementById('embedProvider').value = provider;
    }
  });

  // ── Init ──
  (async () => {
    // Fetch server defaults (env-based API key, provider).
    try {
      const cfgRes = await fetch('/api/defaults');
      const cfg = await cfgRes.json();
      if (cfg.hasApiKey) {
        document.getElementById('apiKey').value = '(server)';
        document.getElementById('apiKey').placeholder = 'Using server env key';
      }
      if (cfg.provider) {
        document.getElementById('llmProvider').value = cfg.provider;
        document.getElementById('embedProvider').value = cfg.embedProvider || cfg.provider;
        const defaults = MODEL_DEFAULTS[cfg.provider] || MODEL_DEFAULTS.openai;
        document.getElementById('extractionModel').value = defaults.extraction;
        document.getElementById('answerModel').value = defaults.answer;
        document.getElementById('judgeModel').value = defaults.judge;
      }
    } catch {}

    // Check if a run is active.
    try {
      const res = await fetch('/api/progress');
      const data = await res.json();
      if (data.running) {
        updateStatus('running', 'Running');
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnCancel').style.display = 'inline-block';
        document.getElementById('progressSection').style.display = 'block';
        startPolling(data.runId);
      }
    } catch {}

    // Load history to check for past results.
    try {
      const res = await fetch('/api/runs');
      const runs = await res.json();
      if (runs.length > 0) {
        const latest = runs[0];
        if (latest.status === 'completed') {
          const runRes = await fetch('/api/runs/' + latest.id);
          if (runRes.ok) {
            currentRun = await runRes.json();
            renderResults(currentRun);
          }
        }
      }
    } catch {}
  })();
</script>

</body>
</html>
